<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>LiquidityForge • BTC/USD SMC Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://s3.tradingview.com/tv.js"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css" rel="stylesheet">
  <style>
    body { font-family: 'Inter', system-ui, sans-serif; }
    .neon-blue { text-shadow: 0 0 10px #22d3ee; }
    .chart-container { height: 420px; }
  </style>
</head>
<body class="bg-zinc-950 text-zinc-200 min-h-screen">

<div class="max-w-7xl mx-auto p-4 md:p-6">

  <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 border-b border-zinc-800 pb-6">
    <div>
      <h1 class="text-4xl font-bold tracking-tight neon-blue">LIQUIDITYFORGE</h1>
      <p class="text-emerald-400 text-sm flex items-center gap-2">
        <span class="w-2 h-2 bg-emerald-400 rounded-full animate-pulse"></span>
        BTC/USD • 5m / 15m • SMC 2026
      </p>
    </div>
    <div class="text-right">
      <div class="text-3xl font-mono font-semibold" id="btc-price">$76,050</div>
      <div class="text-xs text-zinc-500" id="price-change">-0.18% • 24h</div>
    </div>
  </div>

  <div class="grid grid-cols-1 lg:grid-cols-12 gap-6">

    <!-- Charts Section -->
    <div class="lg:col-span-8 space-y-6">
      <div>
        <div class="flex items-center justify-between mb-3">
          <span class="px-3 py-1 bg-amber-500/10 text-amber-400 text-xs font-medium rounded">15-MIN BIAS ENGINE</span>
        </div>
        <div class="chart-container bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800" id="tv-15min"></div>
      </div>

      <div>
        <div class="flex items-center justify-between mb-3">
          <span class="px-3 py-1 bg-cyan-500/10 text-cyan-400 text-xs font-medium rounded">5-MIN EXECUTION ENGINE</span>
        </div>
        <div class="chart-container bg-zinc-900 rounded-2xl overflow-hidden border border-zinc-800" id="tv-5min"></div>
      </div>
    </div>

    <!-- Right Sidebar -->
    <div class="lg:col-span-4 space-y-6">
      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <div class="flex justify-between items-start mb-4">
          <div>
            <div class="uppercase text-xs tracking-widest text-zinc-500">CURRENT SIGNAL</div>
            <div id="main-signal" class="text-4xl font-bold text-emerald-400">WAIT</div>
          </div>
          <div id="signal-badge" class="px-5 py-2 rounded-2xl text-sm font-semibold bg-amber-500/10 text-amber-400">NO SETUP</div>
        </div>
      </div>

      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <h3 class="font-semibold mb-4">SIGNAL REASONS</h3>
        <div id="signal-reasons" class="space-y-3 text-sm"></div>
      </div>

      <div class="bg-zinc-900 border border-zinc-700 rounded-3xl p-6">
        <h3 class="font-semibold mb-4">ENTRY CHECKLIST</h3>
        <div id="checklist" class="space-y-3"></div>
      </div>
    </div>
  </div>
</div>

<script>
function initCharts() {
  new TradingView.widget({
    "width": "100%", "height": "100%", "symbol": "BITSTAMP:BTCUSD", "interval": "15",
    "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en",
    "toolbar_bg": "#18181b", "enable_publishing": false, "container_id": "tv-15min"
  });

  new TradingView.widget({
    "width": "100%", "height": "100%", "symbol": "BITSTAMP:BTCUSD", "interval": "5",
    "timezone": "Etc/UTC", "theme": "dark", "style": "1", "locale": "en",
    "toolbar_bg": "#18181b", "enable_publishing": false, "container_id": "tv-5min"
  });
}

function updateStrategy() {
  document.getElementById('main-signal').textContent = "WAIT";
  document.getElementById('signal-badge').className = "px-5 py-2 rounded-2xl text-sm font-semibold bg-amber-500/10 text-amber-400";
  
  document.getElementById('signal-reasons').innerHTML = `
    <div class="p-3 bg-zinc-800 rounded-2xl flex items-center gap-2">
      <span class="text-emerald-400">✔</span> EMA 200 Bullish Bias Active
    </div>
    <div class="p-3 bg-zinc-800 rounded-2xl flex items-center gap-2">
      <span class="text-amber-400">⏳</span> Waiting for Liquidity Sweep + Retest
    </div>
  `;

  document.getElementById('checklist').innerHTML = `
    <div class="flex justify-between p-3 bg-zinc-800 rounded-2xl"><span>Trend Filter (15m)</span><span class="text-emerald-400">✔</span></div>
    <div class="flex justify-between p-3 bg-zinc-800 rounded-2xl"><span>Liquidity Sweep</span><span class="text-amber-400">Waiting</span></div>
    <div class="flex justify-between p-3 bg-zinc-800 rounded-2xl"><span>Retest Confirmation</span><span class="text-amber-400">Waiting</span></div>
    <div class="flex justify-between p-3 bg-zinc-800 rounded-2xl"><span>RSI Momentum</span><span class="text-emerald-400">OK</span></div>
  `;
}

window.onload = () => {
  initCharts();
  updateStrategy();
  
  let price = 76050;
  setInterval(() => {
    price += Math.random() * 80 - 40;
    document.getElementById('btc-price').textContent = '$' + Math.round(price).toLocaleString();
  }, 8000);
};
</script>

</body>
</html>
