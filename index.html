<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Top-Down Analysis | Trading Bias Engine</title>
    <script src="https://s3.tradingview.com/tv.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        :root {
            --bg-dark: #0a0e27;
            --bg-card: #151b3f;
            --bg-input: #1a2247;
            --border-color: #2a3f7f;
            --text-primary: #e0e6ff;
            --text-secondary: #a0b0d8;
            --accent-green: #00ff88;
            --accent-red: #ff3366;
            --accent-yellow: #ffd700;
            --glow-green: 0 0 20px rgba(0, 255, 136, 0.5);
            --glow-red: 0 0 20px rgba(255, 51, 102, 0.5);
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            font-family: 'Segoe UI', 'Roboto', sans-serif;
            background: linear-gradient(135deg, #0a0e27 0%, #1a1a3e 100%);
            color: var(--text-primary);
            line-height: 1.6;
            overflow-x: hidden;
        }

        /* Navigation */
        nav {
            background: rgba(15, 20, 50, 0.95);
            backdrop-filter: blur(10px);
            border-bottom: 1px solid var(--border-color);
            padding: 1rem 2rem;
            position: sticky;
            top: 0;
            z-index: 1000;
            box-shadow: 0 4px 30px rgba(0, 255, 136, 0.05);
        }

        nav .container {
            max-width: 1400px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        nav .logo {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-green);
            text-shadow: var(--glow-green);
            letter-spacing: 2px;
        }

        nav .nav-links {
            display: flex;
            gap: 2rem;
            list-style: none;
        }

        nav a {
            color: var(--text-secondary);
            text-decoration: none;
            transition: all 0.3s ease;
            position: relative;
        }

        nav a:hover {
            color: var(--accent-green);
            text-shadow: var(--glow-green);
        }

        nav a::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 0;
            width: 0;
            height: 2px;
            background: var(--accent-green);
            transition: width 0.3s ease;
            box-shadow: var(--glow-green);
        }

        nav a:hover::after {
            width: 100%;
        }

        /* Container */
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* Hero Section */
        .hero {
            padding: 4rem 2rem;
            text-align: center;
            background: linear-gradient(180deg, rgba(0, 255, 136, 0.05) 0%, transparent 100%);
            border-bottom: 1px solid var(--border-color);
        }

        .hero h1 {
            font-size: 3rem;
            margin-bottom: 1rem;
            color: var(--accent-green);
            text-shadow: var(--glow-green);
            font-weight: 700;
        }

        .hero p {
            font-size: 1.2rem;
            color: var(--text-secondary);
            margin-bottom: 2rem;
            max-width: 800px;
            margin-left: auto;
            margin-right: auto;
        }

        /* Cards */
        .card {
            background: rgba(21, 27, 63, 0.8);
            backdrop-filter: blur(10px);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .card:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
            transform: translateY(-5px);
        }

        /* Tabs */
        .tabs {
            display: flex;
            gap: 1rem;
            border-bottom: 2px solid var(--border-color);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .tab-btn {
            background: transparent;
            border: none;
            color: var(--text-secondary);
            padding: 1rem 2rem;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.3s ease;
            position: relative;
            font-weight: 600;
        }

        .tab-btn:hover {
            color: var(--accent-green);
        }

        .tab-btn.active {
            color: var(--accent-green);
            text-shadow: var(--glow-green);
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 3px;
            background: var(--accent-green);
            box-shadow: var(--glow-green);
        }

        .tab-content {
            display: none;
        }

        .tab-content.active {
            display: block;
            animation: fadeIn 0.5s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /* Bias Signal Display */
        .bias-container {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 2rem;
            margin-bottom: 3rem;
        }

        @media (max-width: 1024px) {
            .bias-container {
                grid-template-columns: 1fr;
            }
        }

        .bias-signal {
            padding: 2rem;
            border-radius: 12px;
            border: 2px solid;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            overflow: hidden;
        }

        .bias-signal::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.1), transparent);
            transition: left 0.5s ease;
        }

        .bias-signal:hover::before {
            left: 100%;
        }

        .bias-signal.buy {
            background: linear-gradient(135deg, rgba(0, 255, 136, 0.15) 0%, rgba(0, 255, 136, 0.05) 100%);
            border-color: var(--accent-green);
            box-shadow: var(--glow-green), inset 0 0 20px rgba(0, 255, 136, 0.05);
        }

        .bias-signal.sell {
            background: linear-gradient(135deg, rgba(255, 51, 102, 0.15) 0%, rgba(255, 51, 102, 0.05) 100%);
            border-color: var(--accent-red);
            box-shadow: var(--glow-red), inset 0 0 20px rgba(255, 51, 102, 0.05);
        }

        .bias-signal.neutral {
            background: linear-gradient(135deg, rgba(160, 176, 216, 0.1) 0%, rgba(160, 176, 216, 0.02) 100%);
            border-color: var(--text-secondary);
            box-shadow: 0 0 10px rgba(160, 176, 216, 0.1);
        }

        .signal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            padding-bottom: 1rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .asset-name {
            font-size: 1.5rem;
            font-weight: 700;
        }

        .signal-badge {
            padding: 0.5rem 1.5rem;
            border-radius: 20px;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        .badge-buy {
            background: rgba(0, 255, 136, 0.3);
            color: var(--accent-green);
            box-shadow: var(--glow-green);
        }

        .badge-sell {
            background: rgba(255, 51, 102, 0.3);
            color: var(--accent-red);
            box-shadow: var(--glow-red);
        }

        .badge-neutral {
            background: rgba(160, 176, 216, 0.2);
            color: var(--text-secondary);
        }

        .analysis-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1.5rem;
            margin-bottom: 1.5rem;
        }

        .analysis-item {
            background: rgba(26, 34, 71, 0.5);
            padding: 1rem;
            border-radius: 8px;
            border-left: 3px solid var(--border-color);
        }

        .analysis-label {
            font-size: 0.9rem;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 0.5rem;
        }

        .analysis-value {
            font-size: 1.2rem;
            font-weight: 600;
            color: var(--text-primary);
        }

        .analysis-item.bullish {
            border-left-color: var(--accent-green);
            background: rgba(0, 255, 136, 0.08);
        }

        .analysis-item.bearish {
            border-left-color: var(--accent-red);
            background: rgba(255, 51, 102, 0.08);
        }

        .analysis-item.neutral {
            border-left-color: var(--text-secondary);
            background: rgba(160, 176, 216, 0.05);
        }

        .risk-management {
            background: rgba(26, 34, 71, 0.7);
            padding: 1.5rem;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            margin-top: 1.5rem;
        }

        .risk-title {
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 1rem;
            color: var(--accent-yellow);
        }

        .risk-row {
            display: flex;
            justify-content: space-between;
            padding: 0.75rem 0;
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }

        .risk-row:last-child {
            border-bottom: none;
        }

        .risk-label {
            color: var(--text-secondary);
            font-size: 0.9rem;
        }

        .risk-value {
            color: var(--text-primary);
            font-weight: 600;
            font-family: 'Courier New', monospace;
        }

        .warning-box {
            background: rgba(255, 215, 0, 0.1);
            border: 1px solid rgba(255, 215, 0, 0.3);
            border-radius: 8px;
            padding: 1rem;
            margin-top: 1rem;
            font-size: 0.9rem;
            color: var(--text-secondary);
            border-left: 3px solid var(--accent-yellow);
        }

        /* Chart Section */
        .chart-section {
            margin: 3rem 0;
        }

        .chart-container {
            background: rgba(21, 27, 63, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            overflow: hidden;
            padding: 1.5rem;
        }

        .tradingview-widget-container {
            width: 100%;
            height: 500px;
            border-radius: 8px;
            overflow: hidden;
            background: #111;
        }

        .tradingview-widget-container__widget {
            width: 100%;
            height: 100%;
        }

        /* Education Section */
        .education-section {
            margin: 4rem 0;
        }

        .education-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 2rem;
            margin-top: 2rem;
        }

        .education-card {
            background: rgba(21, 27, 63, 0.8);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 2rem;
            transition: all 0.3s ease;
        }

        .education-card:hover {
            border-color: var(--accent-green);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.1);
        }

        .education-card h3 {
            color: var(--accent-green);
            margin-bottom: 1rem;
            font-size: 1.3rem;
        }

        .education-card ol,
        .education-card ul {
            margin-left: 1.5rem;
            color: var(--text-secondary);
        }

        .education-card li {
            margin-bottom: 0.8rem;
            line-height: 1.6;
        }

        /* Control Section */
        .control-section {
            display: flex;
            gap: 1rem;
            margin: 2rem 0;
            flex-wrap: wrap;
        }

        button {
            background: linear-gradient(135deg, var(--accent-green) 0%, #00dd77 100%);
            color: #000;
            border: none;
            padding: 0.9rem 2rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            font-size: 1rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: var(--glow-green);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 0 30px rgba(0, 255, 136, 0.6);
        }

        button:active {
            transform: translateY(0);
        }

        button.secondary {
            background: transparent;
            color: var(--text-secondary);
            border: 1px solid var(--border-color);
            box-shadow: none;
        }

        button.secondary:hover {
            border-color: var(--accent-green);
            color: var(--accent-green);
            box-shadow: var(--glow-green);
        }

        /* Loading State */
        .loading {
            display: inline-block;
            width: 12px;
            height: 12px;
            margin-left: 8px;
            vertical-align: middle;
            border: 2px solid rgba(0, 255, 136, 0.3);
            border-top: 2px solid var(--accent-green);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Footer */
        footer {
            border-top: 1px solid var(--border-color);
            padding: 3rem 2rem;
            text-align: center;
            color: var(--text-secondary);
            margin-top: 4rem;
            background: linear-gradient(180deg, transparent 0%, rgba(0, 255, 136, 0.02) 100%);
        }

        footer a {
            color: var(--accent-green);
            text-decoration: none;
            transition: all 0.3s ease;
        }

        footer a:hover {
            text-shadow: var(--glow-green);
        }

        /* Responsive */
        @media (max-width: 768px) {
            .hero h1 {
                font-size: 2rem;
            }

            nav .nav-links {
                display: none;
            }

            .analysis-grid {
                grid-template-columns: 1fr;
            }

            .tradingview-widget-container {
                height: 400px;
            }

            .card {
                padding: 1.5rem;
            }

            .control-section {
                flex-direction: column;
            }

            button {
                width: 100%;
            }
        }

        /* Utility Classes */
        .text-center {
            text-align: center;
        }

        .mt-2 {
            margin-top: 2rem;
        }

        .mb-2 {
            margin-bottom: 2rem;
        }

        .text-small {
            font-size: 0.85rem;
            color: var(--text-secondary);
        }

        .timestamp {
            font-size: 0.85rem;
            color: var(--text-secondary);
            font-family: 'Courier New', monospace;
            margin-top: 1rem;
        }

        .status-indicator {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            margin-right: 0.5rem;
            animation: pulse 2s ease-in-out infinite;
        }

        .status-indicator.buy {
            background: var(--accent-green);
            box-shadow: var(--glow-green);
        }

        .status-indicator.sell {
            background: var(--accent-red);
            box-shadow: var(--glow-red);
        }

        .status-indicator.neutral {
            background: var(--text-secondary);
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
    </style>
</head>
