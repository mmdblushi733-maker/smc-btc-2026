<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Down Analysis - Big Picture Trading | Gold & Bitcoin</title>
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;700;900&family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root {
  --bg:#050709; --bg2:#090c12; --bg3:#0d1018;
  --card:#0f1320; --card2:#141924;
  --border:#1c2535; --border2:#263348;
  --green:#00ff88; --green2:#00e57a;
  --green-dim:rgba(0,255,136,0.1);
  --green-glow:0 0 30px rgba(0,255,136,0.25);
  --red:#ff2d55; --red-dim:rgba(255,45,85,0.1);
  --red-glow:0 0 30px rgba(255,45,85,0.25);
  --gold:#f0b429; --gold-dim:rgba(240,180,41,0.1);
  --blue:#4da6ff;
  --gray:#4a5568; --gray2:#2d3748;
  --text:#a8bacf; --text2:#5a7080; --white:#f0f4ff;
  --font-h:'Orbitron',sans-serif;
  --font-b:'Inter',sans-serif;
  --font-m:'JetBrains Mono',monospace;
}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{background:var(--bg);color:var(--text);font-family:var(--font-b);font-weight:400;line-height:1.6;overflow-x:hidden;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,255,136,.015) 1px,transparent 1px),linear-gradient(90deg,rgba(0,255,136,.015) 1px,transparent 1px);background-size:56px 56px;pointer-events:none;z-index:0;}
::-webkit-scrollbar{width:6px;} ::-webkit-scrollbar-track{background:var(--bg2);} ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px;} ::-webkit-scrollbar-thumb:hover{background:var(--green);}
.container{max-width:1200px;margin:0 auto;padding:0 24px;}

/* NAV */
#navbar{position:fixed;top:0;left:0;right:0;z-index:1000;background:rgba(5,7,9,.96);backdrop-filter:blur(20px);border-bottom:1px solid var(--border);transition:all .3s;}
.nav-inner{display:flex;align-items:center;justify-content:space-between;height:64px;}
.nav-brand{display:flex;align-items:center;gap:12px;font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--white);letter-spacing:.06em;text-decoration:none;}
.nav-dot{width:10px;height:10px;background:var(--green);border-radius:50%;box-shadow:0 0 10px var(--green);animation:pulse 1.5s infinite;}
.nav-links{display:flex;align-items:center;gap:28px;list-style:none;}
.nav-links a{font-family:var(--font-m);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--text2);text-decoration:none;transition:color .2s;}
.nav-links a:hover{color:var(--green);}
.nav-live{display:flex;align-items:center;gap:8px;font-family:var(--font-m);font-size:11px;letter-spacing:.1em;color:var(--green);border:1px solid rgba(0,255,136,.3);padding:7px 16px;}
.nav-live .dot{width:7px;height:7px;background:var(--green);border-radius:50%;animation:pulse 1.2s infinite;}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1);}50%{opacity:.3;transform:scale(.7);}}

/* TICKER */
.ticker-wrap{margin-top:64px;background:var(--bg2);border-bottom:1px solid var(--border);position:relative;z-index:10;}

/* HERO */
.hero{position:relative;z-index:10;padding:96px 0 80px;text-align:center;overflow:hidden;}
.hero::after{content:'';position:absolute;bottom:-160px;left:50%;transform:translateX(-50%);width:900px;height:480px;background:radial-gradient(ellipse,rgba(0,255,136,.06) 0%,transparent 65%);pointer-events:none;}
.hero-badge{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-m);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);border:1px solid rgba(0,255,136,.25);padding:8px 20px;margin-bottom:32px;animation:fadeUp .6s ease both;}
.hero h1{font-family:var(--font-h);font-size:clamp(40px,7vw,90px);font-weight:900;color:var(--white);line-height:.93;letter-spacing:.02em;margin-bottom:10px;animation:fadeUp .6s .08s ease both;}
.hero h1 .grad{display:block;background:linear-gradient(90deg,var(--green),#00ccff);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;filter:drop-shadow(0 0 28px rgba(0,255,136,.4));}
.hero-sub{font-size:clamp(14px,2vw,18px);color:var(--text2);max-width:600px;margin:0 auto 36px;line-height:1.7;animation:fadeUp .6s .14s ease both;}
.hero-sub strong{color:var(--gold);font-weight:600;}
.hero-prob{display:inline-block;background:rgba(255,45,85,.07);border:1px solid rgba(255,45,85,.25);border-left:3px solid var(--red);padding:18px 28px;text-align:left;max-width:640px;font-size:15px;line-height:1.7;color:var(--text);margin-bottom:44px;animation:fadeUp .6s .2s ease both;}
.hero-prob strong{color:var(--white);}
.hero-btns{display:flex;align-items:center;justify-content:center;gap:16px;flex-wrap:wrap;animation:fadeUp .6s .26s ease both;}
.btn{display:inline-flex;align-items:center;gap:8px;font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.1em;text-transform:uppercase;padding:15px 32px;text-decoration:none;cursor:pointer;border:none;transition:all .3s;position:relative;overflow:hidden;}
.btn::before{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.12),transparent);transform:translateX(-100%);transition:transform .5s;}
.btn:hover::before{transform:translateX(100%);}
.btn-primary{background:var(--green);color:#050709;}
.btn-primary:hover{box-shadow:var(--green-glow);transform:translateY(-2px);}
.btn-outline{background:transparent;color:var(--text);border:1px solid var(--border2);}
.btn-outline:hover{border-color:var(--green);color:var(--green);}
@keyframes fadeUp{from{opacity:0;transform:translateY(22px);}to{opacity:1;transform:translateY(0);}}

/* SECTION */
.section{position:relative;z-index:10;padding:80px 0;}
.section-alt{background:var(--bg2);border-top:1px solid var(--border);border-bottom:1px solid var(--border);}
.sec-tag{display:flex;align-items:center;justify-content:center;gap:14px;margin-bottom:12px;font-family:var(--font-m);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--green);}
.sec-tag::before,.sec-tag::after{content:'';display:block;width:48px;height:1px;}
.sec-tag::before{background:linear-gradient(90deg,transparent,var(--green));}
.sec-tag::after{background:linear-gradient(90deg,var(--green),transparent);}
.sec-title{font-family:var(--font-h);font-size:clamp(26px,4vw,42px);font-weight:700;color:var(--white);text-align:center;letter-spacing:.03em;line-height:1.2;margin-bottom:12px;}
.sec-title span{color:var(--green);}
.sec-desc{text-align:center;color:var(--text2);font-size:16px;max-width:560px;margin:0 auto 52px;line-height:1.7;}

/* WHAT CARDS */
.what-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;margin-top:44px;}
.what-card{background:var(--card);border:1px solid var(--border);padding:36px 28px;transition:all .3s;position:relative;overflow:hidden;}
.what-card::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,transparent,var(--green),transparent);transform:scaleX(0);transition:transform .4s;}
.what-card:hover{background:var(--card2);border-color:var(--border2);}
.what-card:hover::before{transform:scaleX(1);}
.what-card-bg{font-family:var(--font-h);font-size:56px;font-weight:900;color:rgba(0,255,136,.05);line-height:1;position:absolute;top:12px;right:14px;}
.what-card-icon{font-size:30px;margin-bottom:18px;}
.what-tf{display:inline-block;margin-bottom:14px;font-family:var(--font-m);font-size:11px;letter-spacing:.12em;text-transform:uppercase;padding:4px 12px;border:1px solid;}
.htf{color:var(--gold);border-color:rgba(240,180,41,.4);background:rgba(240,180,41,.08);}
.mtf{color:var(--blue);border-color:rgba(77,166,255,.4);background:rgba(77,166,255,.08);}
.ltf{color:var(--green);border-color:rgba(0,255,136,.4);background:var(--green-dim);}
.what-card h3{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:10px;}
.what-card p{font-size:14px;color:var(--text2);line-height:1.65;}

/* SIMULATOR */
.sim-wrap{max-width:960px;margin:0 auto;}
.asset-tabs{display:flex;gap:3px;margin-bottom:3px;}
.asset-tab{flex:1;padding:16px 24px;font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:.06em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .25s;text-align:center;}
.asset-tab:hover{border-color:var(--border2);color:var(--text);}
.asset-tab.active{background:var(--card2);border-color:var(--green);color:var(--green);border-bottom:2px solid var(--green);}
.asset-tab .t-icon{font-size:18px;margin-bottom:2px;display:block;}
.bias-panel{background:var(--card);border:1px solid var(--border);padding:32px;display:none;}
.bias-panel.active{display:block;}
.tf-row{display:grid;grid-template-columns:110px 1fr;align-items:center;gap:20px;margin-bottom:16px;padding-bottom:16px;border-bottom:1px solid var(--border);}
.tf-row:last-of-type{border-bottom:none;margin-bottom:0;padding-bottom:0;}
.tf-label{font-family:var(--font-h);font-size:13px;font-weight:700;letter-spacing:.08em;color:var(--white);}
.tf-sub{font-family:var(--font-m);font-size:9px;color:var(--text2);letter-spacing:.1em;margin-top:2px;}
.tf-right{display:flex;align-items:center;flex-wrap:wrap;gap:12px;}
.bias-badge{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-h);font-size:14px;font-weight:700;letter-spacing:.07em;text-transform:uppercase;padding:12px 22px;border:2px solid;min-width:220px;transition:all .5s;}
.bias-badge .arr{font-size:18px;}
.bullish{background:rgba(0,255,136,.1);color:var(--green);border-color:rgba(0,255,136,.5);box-shadow:0 0 18px rgba(0,255,136,.1);}
.bearish{background:rgba(255,45,85,.1);color:var(--red);border-color:rgba(255,45,85,.5);box-shadow:0 0 18px rgba(255,45,85,.1);}
.neutral-badge{background:rgba(74,85,104,.15);color:var(--gray);border-color:rgba(74,85,104,.4);}
.bias-desc{flex:1;font-size:13px;color:var(--text2);line-height:1.5;}
.bias-divider{height:1px;background:var(--border2);margin:28px 0;}
.overall-label{font-family:var(--font-m);font-size:11px;letter-spacing:.2em;text-transform:uppercase;color:var(--text2);margin-bottom:20px;text-align:center;}
.overall-box{display:inline-flex;flex-direction:column;align-items:center;gap:10px;padding:30px 52px;border:2px solid;min-width:330px;transition:all .6s;position:relative;overflow:hidden;}
.overall-box::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,transparent,rgba(255,255,255,.02));pointer-events:none;}
.ob-buy{border-color:var(--green);background:linear-gradient(135deg,rgba(0,255,136,.12),rgba(0,255,136,.04));box-shadow:var(--green-glow),inset 0 0 40px rgba(0,255,136,.04);}
.ob-sell{border-color:var(--red);background:linear-gradient(135deg,rgba(255,45,85,.12),rgba(255,45,85,.04));box-shadow:var(--red-glow),inset 0 0 40px rgba(255,45,85,.04);}
.ob-neutral{border-color:var(--gray2);background:rgba(45,55,72,.2);box-shadow:none;}
.ob-icon{font-size:42px;line-height:1;}
.ob-signal{font-family:var(--font-h);font-size:30px;font-weight:900;letter-spacing:.05em;line-height:1;}
.ob-buy .ob-signal{color:var(--green);text-shadow:0 0 20px rgba(0,255,136,.5);}
.ob-sell .ob-signal{color:var(--red);text-shadow:0 0 20px rgba(255,45,85,.5);}
.ob-neutral .ob-signal{color:var(--gray);}
.ob-tag{font-family:var(--font-m);font-size:11px;letter-spacing:.14em;text-transform:uppercase;}
.ob-buy .ob-tag{color:rgba(0,255,136,.7);}
.ob-sell .ob-tag{color:rgba(255,45,85,.7);}
.ob-neutral .ob-tag{color:var(--text2);}
.wait-box{margin-top:20px;padding:16px 28px;background:rgba(74,85,104,.1);border:1px solid rgba(74,85,104,.3);font-family:var(--font-m);font-size:12px;letter-spacing:.12em;text-transform:uppercase;color:var(--gray);text-align:center;display:none;}
.overall-center{text-align:center;}
.refresh-row{text-align:center;margin-top:24px;}
.btn-refresh{display:inline-flex;align-items:center;gap:10px;font-family:var(--font-m);font-size:12px;letter-spacing:.15em;text-transform:uppercase;padding:13px 28px;cursor:pointer;background:transparent;color:var(--text);border:1px solid var(--border2);transition:all .3s;}
.btn-refresh:hover{border-color:var(--green);color:var(--green);}
.refresh-time{font-family:var(--font-m);font-size:10px;color:var(--text2);letter-spacing:.08em;margin-top:8px;}

/* CHART */
.chart-tabs{display:flex;gap:3px;margin-bottom:3px;}
.chart-tab{padding:14px 32px;font-family:var(--font-h);font-size:12px;font-weight:700;letter-spacing:.08em;text-transform:uppercase;cursor:pointer;border:1px solid var(--border);background:var(--card);color:var(--text2);transition:all .25s;}
.chart-tab:hover{border-color:var(--border2);color:var(--text);}
.chart-tab.active{background:var(--card2);border-color:var(--green);color:var(--green);}
.chart-panel{display:none;}
.chart-panel.active{display:block;}
.chart-wrap{background:var(--card);border:1px solid var(--border);overflow:hidden;}
.chart-hdr{display:flex;align-items:center;justify-content:space-between;padding:16px 20px;border-bottom:1px solid var(--border);background:var(--card2);}
.chart-hdr-title{font-family:var(--font-h);font-size:13px;font-weight:700;color:var(--white);letter-spacing:.06em;}
.chart-badge{font-family:var(--font-m);font-size:10px;letter-spacing:.12em;padding:4px 12px;color:var(--green);border:1px solid rgba(0,255,136,.3);background:var(--green-dim);}
.ta-row{display:grid;grid-template-columns:1fr 1fr;gap:3px;margin-top:3px;}
.ta-mini{background:var(--card);border:1px solid var(--border);overflow:hidden;}
.ta-mini-hdr{padding:12px 18px;border-bottom:1px solid var(--border);background:var(--card2);font-family:var(--font-m);font-size:10px;letter-spacing:.15em;text-transform:uppercase;color:var(--gold);}

/* STEPS */
.steps-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:2px;}
.step-card{background:var(--card);border:1px solid var(--border);padding:36px 28px;text-align:center;transition:all .3s;}
.step-card:hover{background:var(--card2);transform:translateY(-4px);border-color:var(--border2);box-shadow:0 20px 60px rgba(0,0,0,.4);}
.step-num-ring{display:flex;align-items:center;justify-content:center;width:64px;height:64px;margin:0 auto 24px;border:2px solid var(--green);position:relative;}
.step-num-ring::before{content:'';position:absolute;inset:5px;background:var(--green-dim);}
.step-num{font-family:var(--font-h);font-size:22px;font-weight:900;color:var(--green);position:relative;z-index:1;}
.step-card h3{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--white);letter-spacing:.04em;margin:14px 0 10px;}
.step-card p{font-size:14px;color:var(--text2);line-height:1.65;margin-bottom:16px;}
.step-list{list-style:none;text-align:left;}
.step-list li{display:flex;align-items:flex-start;gap:8px;font-size:13px;color:var(--text2);margin-bottom:6px;}
.step-list li::before{content:'▸';color:var(--green);font-size:10px;margin-top:3px;flex-shrink:0;}

/* MISTAKES */
.mistakes-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:2px;}
.mistake-card{background:var(--card);border:1px solid var(--border);border-left:3px solid var(--red);padding:24px 28px;display:flex;align-items:flex-start;gap:18px;transition:background .25s;}
.mistake-card:hover{background:var(--card2);}
.mx{font-family:var(--font-h);font-size:32px;font-weight:900;color:var(--red);opacity:.6;line-height:1;flex-shrink:0;}
.mistake-card h4{font-family:var(--font-h);font-size:14px;font-weight:700;color:var(--white);letter-spacing:.04em;margin-bottom:6px;}
.mistake-card p{font-size:13px;color:var(--text2);line-height:1.6;}

/* RULE BANNER */
.rule-banner{background:linear-gradient(135deg,rgba(0,255,136,.07),rgba(0,204,255,.03));border:1px solid rgba(0,255,136,.22);border-left:4px solid var(--green);padding:32px 40px;text-align:center;margin-top:56px;}
.rule-q{font-family:var(--font-h);font-size:clamp(17px,2.5vw,28px);font-weight:700;color:var(--white);letter-spacing:.04em;line-height:1.35;margin-bottom:10px;}
.rule-q span{color:var(--green);}
.rule-s{font-family:var(--font-m);font-size:12px;letter-spacing:.1em;color:var(--text2);}

/* FOOTER */
footer{position:relative;z-index:10;background:var(--bg2);border-top:1px solid var(--border);padding:40px 0 28px;}
.foot-inner{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:20px;margin-bottom:22px;}
.foot-brand{font-family:var(--font-h);font-size:15px;font-weight:700;color:var(--green);letter-spacing:.08em;}
.foot-links{display:flex;gap:28px;list-style:none;}
.foot-links a{font-family:var(--font-m);font-size:10px;letter-spacing:.1em;text-transform:uppercase;color:var(--text2);text-decoration:none;transition:color .2s;}
.foot-links a:hover{color:var(--green);}
.foot-disc{border-top:1px solid var(--border);padding-top:18px;font-family:var(--font-m);font-size:10px;color:var(--text2);opacity:.45;text-align:center;line-height:1.8;}

/* REVEAL */
.reveal{opacity:0;transform:translateY(20px);transition:opacity .6s ease,transform .6s ease;}
.reveal.vis{opacity:1;transform:translateY(0);}
.stagger>*{opacity:0;transform:translateY(20px);transition:opacity .5s ease,transform .5s ease;}
.stagger.vis>*:nth-child(1){opacity:1;transform:none;transition-delay:0s;}
.stagger.vis>*:nth-child(2){opacity:1;transform:none;transition-delay:.1s;}
.stagger.vis>*:nth-child(3){opacity:1;transform:none;transition-delay:.2s;}
.stagger.vis>*:nth-child(4){opacity:1;transform:none;transition-delay:.3s;}

/* RESPONSIVE */
@media(max-width:900px){
  .nav-links{display:none;}
  .what-grid,.steps-grid,.mistakes-grid,.ta-row{grid-template-columns:1fr;}
  .hero{padding:72px 0 60px;}
  .section{padding:60px 0;}
  .bias-panel{padding:20px;}
  .tf-row{grid-template-columns:80px 1fr;gap:10px;}
  .tf-right{flex-direction:column;align-items:flex-start;}
  .bias-badge{min-width:0;width:100%;justify-content:center;}
  .overall-box{padding:24px 28px;min-width:0;width:100%;}
  .ob-signal{font-size:22px;}
  .chart-tabs{flex-direction:column;}
  .foot-inner{flex-direction:column;text-align:center;}
  .foot-links{justify-content:center;}
}
@media(max-width:600px){
  .container{padding:0 16px;}
  nav{padding:0 16px;}
  .hero h1{font-size:36px;}
  .asset-tabs{flex-direction:column;}
}
</style>
</head>

    </script>

<!-- HERO -->
<section class="hero">
  <div class="container">
    <div class="hero-badge"><span class="dot" style="width:6px;height:6px;background:var(--green);border-radius:50%;animation:pulse 1.5s infinite;"></span>Professional Trading Framework</div>
    <h1>TOP DOWN<br><span class="grad">ANALYSIS</span></h1>
    <p class="hero-sub">Trade with
