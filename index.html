<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>TopDown Pro — Institutional-Grade Market Analysis</title>
<style>
  /* ============================================================
     ROOT VARIABLES & RESET
  ============================================================ */
  :root {
    --bg-primary: #080c14;
    --bg-secondary: #0d1420;
    --bg-card: rgba(13, 20, 32, 0.85);
    --bg-glass: rgba(255, 255, 255, 0.03);
    --border-color: rgba(255, 255, 255, 0.06);
    --border-active: rgba(56, 189, 248, 0.25);

    --text-primary: #e2e8f0;
    --text-secondary: #8892a4;
    --text-muted: #4a5568;

    --accent-blue: #38bdf8;
    --accent-blue-dark: #0284c7;

    --buy-primary: #00e67a;
    --buy-glow: rgba(0, 230, 122, 0.35);
    --buy-dim: rgba(0, 230, 122, 0.08);

    --sell-primary: #ff3b5c;
    --sell-glow: rgba(255, 59, 92, 0.35);
    --sell-dim: rgba(255, 59, 92, 0.08);

    --neutral-primary: #94a3b8;
    --neutral-glow: rgba(148, 163, 184, 0.2);
    --neutral-dim: rgba(148, 163, 184, 0.06);

    --gold-color: #f5c842;
    --btc-color: #f7931a;

    --font-sans: 'Inter', 'Segoe UI', system-ui, sans-serif;
    --font-mono: 'JetBrains Mono', 'Fira Code', 'Courier New', monospace;

    --radius-sm: 6px;
    --radius-md: 12px;
    --radius-lg: 18px;
    --radius-xl: 24px;

    --transition-fast: 150ms ease;
    --transition-med: 300ms ease;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-sans);
    font-size: 14px;
    line-height: 1.6;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ============================================================
     GOOGLE FONTS
  ============================================================ */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap');

  /* ============================================================
     SCROLLBAR
  ============================================================ */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: var(--bg-primary); }
  ::-webkit-scrollbar-thumb { background: #1e2d42; border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: #2a3d56; }

  /* ============================================================
     LAYOUT
  ============================================================ */
  .container {
    max-width: 1400px;
    margin: 0 auto;
    padding: 0 24px;
  }

  /* ============================================================
     TOPBAR / NAV
  ============================================================ */
  .topbar {
    position: sticky;
    top: 0;
    z-index: 100;
    background: rgba(8, 12, 20, 0.92);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    border-bottom: 1px solid var(--border-color);
    padding: 0 24px;
  }

  .topbar-inner {
    max-width: 1400px;
    margin: 0 auto;
    display: flex;
    align-items: center;
    justify-content: space-between;
    height: 60px;
    gap: 20px;
  }

  .logo {
    display: flex;
    align-items: center;
    gap: 10px;
    text-decoration: none;
  }

  .logo-icon {
    width: 32px;
    height: 32px;
    background: linear-gradient(135deg, var(--accent-blue), #7c3aed);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .logo-icon svg { width: 18px; height: 18px; fill: white; }

  .logo-text {
    font-size: 16px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--text-primary);
  }

  .logo-text span { color: var(--accent-blue); }

  .nav-pill {
    display: flex;
    align-items: center;
    gap: 4px;
    background: var(--bg-glass);
    border: 1px solid var(--border-color);
    border-radius: 100px;
    padding: 4px;
  }

  .nav-pill a {
    padding: 5px 14px;
    border-radius: 100px;
    font-size: 13px;
    font-weight: 500;
    color: var(--text-secondary);
    text-decoration: none;
    transition: all var(--transition-fast);
  }

  .nav-pill a:hover, .nav-pill a.active {
    background: rgba(56, 189, 248, 0.1);
    color: var(--accent-blue);
  }

  .topbar-right {
    display: flex;
    align-items: center;
    gap: 12px;
  }

  .live-badge {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(0, 230, 122, 0.1);
    border: 1px solid rgba(0, 230, 122, 0.2);
    border-radius: 100px;
    padding: 4px 12px;
    font-size: 12px;
    font-weight: 600;
    color: var(--buy-primary);
    letter-spacing: 0.5px;
  }

  .live-dot {
    width: 6px;
    height: 6px;
    background: var(--buy-primary);
    border-radius: 50%;
    animation: pulse 2s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; transform: scale(1); }
    50% { opacity: 0.5; transform: scale(0.8); }
  }

  /* ============================================================
     HERO
  ============================================================ */
  .hero {
    padding: 64px 24px 48px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  .hero::before {
    content: '';
    position: absolute;
    top: 0; left: 50%; transform: translateX(-50%);
    width: 800px;
    height: 400px;
    background: radial-gradient(ellipse at 50% 0%, rgba(56, 189, 248, 0.06) 0%, transparent 70%);
    pointer-events: none;
  }

  .hero-eyebrow {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    background: rgba(56, 189, 248, 0.08);
    border: 1px solid rgba(56, 189, 248, 0.18);
    border-radius: 100px;
    padding: 5px 16px;
    font-size: 12px;
    font-weight: 600;
    color: var(--accent-blue);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .hero h1 {
    font-size: clamp(28px, 5vw, 52px);
    font-weight: 800;
    letter-spacing: -1.5px;
    line-height: 1.1;
    margin-bottom: 16px;
    background: linear-gradient(180deg, #e2e8f0 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .hero p {
    font-size: 16px;
    color: var(--text-secondary);
    max-width: 560px;
    margin: 0 auto 32px;
    line-height: 1.7;
  }

  /* ============================================================
     ASSET TABS
  ============================================================ */
  .asset-tabs {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin-bottom: 40px;
  }

  .asset-tab {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 24px;
    border-radius: var(--radius-md);
    border: 1px solid var(--border-color);
    background: var(--bg-glass);
    cursor: pointer;
    transition: all var(--transition-med);
    font-weight: 600;
    font-size: 15px;
    color: var(--text-secondary);
  }

  .asset-tab:hover {
    border-color: rgba(255,255,255,0.12);
    color: var(--text-primary);
  }

  .asset-tab.active[data-asset="gold"] {
    border-color: rgba(245, 200, 66, 0.4);
    background: rgba(245, 200, 66, 0.08);
    color: var(--gold-color);
    box-shadow: 0 0 20px rgba(245, 200, 66, 0.1);
  }

  .asset-tab.active[data-asset="btc"] {
    border-color: rgba(247, 147, 26, 0.4);
    background: rgba(247, 147, 26, 0.08);
    color: var(--btc-color);
    box-shadow: 0 0 20px rgba(247, 147, 26, 0.1);
  }

  .asset-icon {
    width: 24px;
    height: 24px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 700;
  }

  .asset-icon.gold { background: rgba(245, 200, 66, 0.2); color: var(--gold-color); }
  .asset-icon.btc  { background: rgba(247, 147, 26, 0.2); color: var(--btc-color); }

  /* ============================================================
     ASSET PANEL
  ============================================================ */
  .asset-panel { display: none; }
  .asset-panel.visible { display: block; }

  /* ============================================================
     SECTION TITLE
  ============================================================ */
  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 20px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .section-title {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 1.2px;
    text-transform: uppercase;
  }

  /* ============================================================
     BIAS CARD
  ============================================================ */
  .bias-card {
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-color);
    background: var(--bg-card);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    overflow: hidden;
    margin-bottom: 24px;
    transition: all var(--transition-med);
  }

  .bias-card.buy {
    border-color: rgba(0, 230, 122, 0.2);
    box-shadow: 0 0 40px rgba(0, 230, 122, 0.08), inset 0 1px 0 rgba(0, 230, 122, 0.08);
  }

  .bias-card.sell {
    border-color: rgba(255, 59, 92, 0.2);
    box-shadow: 0 0 40px rgba(255, 59, 92, 0.08), inset 0 1px 0 rgba(255, 59, 92, 0.08);
  }

  .bias-card.neutral {
    border-color: rgba(148, 163, 184, 0.15);
  }

  .bias-header {
    padding: 28px 28px 20px;
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 20px;
    flex-wrap: wrap;
  }

  .bias-signal {
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .bias-icon {
    width: 52px;
    height: 52px;
    border-radius: var(--radius-md);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 22px;
    flex-shrink: 0;
  }

  .bias-icon.buy  { background: var(--buy-dim); box-shadow: 0 0 20px var(--buy-glow); }
  .bias-icon.sell { background: var(--sell-dim); box-shadow: 0 0 20px var(--sell-glow); }
  .bias-icon.neutral { background: var(--neutral-dim); }

  .bias-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 1.2px;
    text-transform: uppercase;
    margin-bottom: 4px;
  }

  .bias-label.buy  { color: var(--buy-primary); }
  .bias-label.sell { color: var(--sell-primary); }
  .bias-label.neutral { color: var(--neutral-primary); }

  .bias-title {
    font-size: 22px;
    font-weight: 800;
    letter-spacing: -0.5px;
    line-height: 1.2;
  }

  .bias-title.buy {
    color: var(--buy-primary);
    text-shadow: 0 0 30px var(--buy-glow);
  }

  .bias-title.sell {
    color: var(--sell-primary);
    text-shadow: 0 0 30px var(--sell-glow);
  }

  .bias-title.neutral { color: var(--neutral-primary); }

  .bias-meta {
    display: flex;
    flex-direction: column;
    align-items: flex-end;
    gap: 6px;
  }

  .confidence-ring {
    display: flex;
    align-items: center;
    gap: 8px;
    font-size: 13px;
    font-weight: 600;
  }

  .confidence-bar {
    width: 80px;
    height: 4px;
    border-radius: 2px;
    background: rgba(255,255,255,0.06);
    overflow: hidden;
  }

  .confidence-fill {
    height: 100%;
    border-radius: 2px;
    transition: width 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  .confidence-fill.buy  { background: var(--buy-primary); }
  .confidence-fill.sell { background: var(--sell-primary); }
  .confidence-fill.neutral { background: var(--neutral-primary); }

  .updated-at {
    font-size: 11px;
    color: var(--text-muted);
    font-family: var(--font-mono);
  }

  /* ============================================================
     INDICATOR GRID
  ============================================================ */
  .indicator-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 1px;
    background: var(--border-color);
    border-top: 1px solid var(--border-color);
  }

  .indicator-cell {
    background: var(--bg-card);
    padding: 18px 24px;
    display: flex;
    flex-direction: column;
    gap: 6px;
    transition: background var(--transition-fast);
  }

  .indicator-cell:hover { background: var(--bg-glass); }

  .indicator-name {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .indicator-name-icon {
    width: 16px;
    height: 16px;
    border-radius: 4px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 9px;
  }

  .indicator-value {
    font-size: 16px;
    font-weight: 700;
    font-family: var(--font-mono);
    letter-spacing: -0.5px;
  }

  .indicator-badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    padding: 2px 8px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: 0.5px;
    width: fit-content;
  }

  .badge-buy    { background: var(--buy-dim); color: var(--buy-primary); border: 1px solid rgba(0,230,122,0.2); }
  .badge-sell   { background: var(--sell-dim); color: var(--sell-primary); border: 1px solid rgba(255,59,92,0.2); }
  .badge-neutral { background: var(--neutral-dim); color: var(--neutral-primary); border: 1px solid rgba(148,163,184,0.15); }

  /* ============================================================
     RISK MANAGEMENT CARD
  ============================================================ */
  .risk-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 16px;
    margin-bottom: 24px;
  }

  .risk-block {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 20px 24px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: border-color var(--transition-fast);
  }

  .risk-block:hover { border-color: rgba(255,255,255,0.1); }

  .risk-block-label {
    font-size: 11px;
    font-weight: 600;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
    margin-bottom: 8px;
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .risk-block-value {
    font-size: 20px;
    font-weight: 800;
    font-family: var(--font-mono);
    letter-spacing: -1px;
    margin-bottom: 4px;
  }

  .risk-block-desc {
    font-size: 12px;
    color: var(--text-secondary);
  }

  .risk-warning {
    background: rgba(245, 200, 66, 0.06);
    border: 1px solid rgba(245, 200, 66, 0.18);
    border-radius: var(--radius-md);
    padding: 14px 18px;
    display: flex;
    align-items: flex-start;
    gap: 12px;
    margin-bottom: 24px;
  }

  .risk-warning-icon { font-size: 18px; flex-shrink: 0; margin-top: 1px; }

  .risk-warning-text {
    font-size: 13px;
    color: rgba(245, 200, 66, 0.85);
    line-height: 1.5;
  }

  .risk-warning-text strong { color: var(--gold-color); }

  /* ============================================================
     TIMEFRAME BREAKDOWN
  ============================================================ */
  .tf-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 12px;
    margin-bottom: 24px;
  }

  .tf-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    display: flex;
    flex-direction: column;
    gap: 8px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    transition: all var(--transition-fast);
    position: relative;
    overflow: hidden;
  }

  .tf-card::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    border-radius: 2px 2px 0 0;
    transition: opacity var(--transition-med);
  }

  .tf-card.bullish::after { background: var(--buy-primary); }
  .tf-card.bearish::after { background: var(--sell-primary); }
  .tf-card.ranging::after { background: var(--neutral-primary); opacity: 0.4; }

  .tf-card:hover { border-color: rgba(255,255,255,0.1); }

  .tf-timeframe {
    font-size: 11px;
    font-weight: 700;
    color: var(--text-muted);
    letter-spacing: 0.8px;
    text-transform: uppercase;
  }

  .tf-bias {
    font-size: 15px;
    font-weight: 700;
    letter-spacing: -0.3px;
  }

  .tf-bias.bullish { color: var(--buy-primary); }
  .tf-bias.bearish { color: var(--sell-primary); }
  .tf-bias.ranging { color: var(--neutral-primary); }

  .tf-details {
    font-size: 11px;
    color: var(--text-muted);
    line-height: 1.5;
    font-family: var(--font-mono);
  }

  /* ============================================================
     CHART SECTION
  ============================================================ */
  .chart-section {
    border-radius: var(--radius-xl);
    border: 1px solid var(--border-color);
    overflow: hidden;
    margin-bottom: 24px;
    background: #000;
  }

  .chart-header {
    padding: 16px 20px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg-card);
    border-bottom: 1px solid var(--border-color);
    gap: 12px;
    flex-wrap: wrap;
  }

  .chart-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 14px;
    font-weight: 600;
  }

  .chart-controls {
    display: flex;
    gap: 4px;
  }

  .chart-tf-btn {
    padding: 4px 10px;
    border-radius: 6px;
    border: 1px solid var(--border-color);
    background: none;
    color: var(--text-muted);
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
  }

  .chart-tf-btn:hover, .chart-tf-btn.active {
    border-color: rgba(56, 189, 248, 0.3);
    background: rgba(56, 189, 248, 0.08);
    color: var(--accent-blue);
  }

  .chart-embed {
    width: 100%;
    height: 480px;
    border: none;
    display: block;
  }

  /* ============================================================
     REFRESH BUTTON
  ============================================================ */
  .btn-refresh {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 22px;
    border-radius: var(--radius-md);
    background: rgba(56, 189, 248, 0.1);
    border: 1px solid rgba(56, 189, 248, 0.25);
    color: var(--accent-blue);
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    transition: all var(--transition-fast);
    font-family: var(--font-sans);
  }

  .btn-refresh:hover {
    background: rgba(56, 189, 248, 0.18);
    border-color: rgba(56, 189, 248, 0.4);
    box-shadow: 0 0 20px rgba(56, 189, 248, 0.15);
  }

  .btn-refresh:active { transform: scale(0.97); }

  .btn-refresh.spinning svg {
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  /* ============================================================
     EDUCATION SECTION
  ============================================================ */
  .edu-section {
    margin: 48px 0;
    padding: 40px 0;
    border-top: 1px solid var(--border-color);
  }

  .edu-header {
    text-align: center;
    margin-bottom: 40px;
  }

  .edu-header h2 {
    font-size: clamp(22px, 4vw, 36px);
    font-weight: 800;
    letter-spacing: -1px;
    margin-bottom: 10px;
    background: linear-gradient(180deg, #e2e8f0 0%, #94a3b8 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }

  .edu-header p {
    color: var(--text-secondary);
    max-width: 480px;
    margin: 0 auto;
  }

  .edu-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
    gap: 20px;
    margin-bottom: 40px;
  }

  .edu-card {
    background: var(--bg-card);
    border: 1px solid var(--border-color);
    border-radius: var(--radius-lg);
    padding: 28px 24px;
    transition: all var(--transition-med);
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
  }

  .edu-
